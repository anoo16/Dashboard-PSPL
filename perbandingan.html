<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Perbandingan Data Tahunan</title>

  <link rel="stylesheet" href="css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<header class="navbar">
  <h1>Perbandingan Tahunan Serapan & Konsumsi</h1>
  <a href="index.html" class="btn-link">← Kembali</a>
</header>

<section class="section">

  <div class="compare-container">

    <!-- ===== MAP ===== -->
    <div id="mapCompare"></div>

    <!-- ===== PANEL ===== -->
    <div class="compare-panel">

      <!-- 🔥 FILTER BARU (2 PROVINSI) -->
      <div class="filter-box">

        <div class="filter-group">
          <label>Provinsi 1</label>
          <select id="provinsi1"></select>
        </div>

        <div class="filter-group">
          <label>Provinsi 2</label>
          <select id="provinsi2"></select>
        </div>

        <button id="resetBtn">Reset</button>

      </div>

      <!-- ===== CHART ===== -->
      <div class="card">
        <h3>Grafik Perbandingan Tahunan</h3>
        <canvas id="compareChart"></canvas>
      </div>

    </div>

  </div>

</section>

<!-- ===== FLOAT BUTTON ===== -->
<div id="toggleTableBtn">▶</div>

<!-- ===== SIDEBAR TABLE ===== -->
<div id="tablePanel">

  <div class="sidebar-header">
    <h3>Data Tahunan</h3>
  </div>

  <div class="sidebar-content">
    <table id="compareTable">
      <thead>
        <tr>
          <th>No</th>
          <th>Provinsi</th>
          <th>Tahun</th>
          <th>Serapan</th>
          <th>Konsumsi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="js/perbandingan.js"></script>
</body>
</html>
